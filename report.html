<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Incident</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Security Incident Mapping (SIM)</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="report.html">Report Incident</a>
        <a href="admin.html">Admin</a>
    </nav>
</header>

<main>

<h2>Report a Security Incident</h2>

<form>

<label>Full Name</label><br>
<input type="text"><br><br>

<label>Role</label><br>
<select>
    <option>Student</option>
    <option>Staff</option>
    <option>Landlord</option>
</select><br><br>

<label>Incident Type</label><br>

<select>
    <option>Select Incident Type</option>
    <option>Theft</option>
    <option>Robbery</option>
    <option>Assault</option>
    <option>Sexual Harassment</option>
    <option>Vandalism</option>
    <option>Drug Abuse</option>
    <option>Cultism</option>
    <option>Missing Person</option>
    <option>Suspicious Activity</option>
    <option>Other</option>
</select>

<br><br>

<label>Location</label><br>
<input type="text"><br><br>
<label>Date of Incident</label><br>
<input type="date"><br><br>

<label>Description</label><br>
<textarea rows="5"></textarea><br><br>

<button type="submit">Submit Report</button>

</form>

</main>

<footer>
<p>© 2026 Security Incident Mapping (SIM)</p>
</footer>

</body>
</html>
